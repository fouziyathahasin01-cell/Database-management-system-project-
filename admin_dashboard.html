<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<h2>Admin Dashboard</h2>

<h3>Students</h3>
{% for s in students %}
<p>{{ s.Student_ID }} - {{ s.Name }} - {{ s.class }}</p>
{% endfor %}

<h3>Payments</h3>
{% for p in payments %}
<p>{{ p.Payment_ID }} - {{ p.amount }}</p>
{% endfor %}

<a href="/logout">Logout</a>
